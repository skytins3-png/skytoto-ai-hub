name: SKYTOTO AI HUB Cloud Runner

on:
  schedule:
    # 한국시간 기준 매일 09:00, 12:00, 15:00, 18:00, 21:00 실행
    # GitHub Actions cron은 UTC 기준입니다.
    - cron: "0 0,3,6,9,12 * * *"
  workflow_dispatch:

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SKYTOTO AI agents
        env:
          SKYTOTO_GOOGLE_SHEET_ID: ${{ secrets.SKYTOTO_GOOGLE_SHEET_ID }}
          SKYTOTO_SERVICE_ACCOUNT_JSON: ${{ secrets.SKYTOTO_SERVICE_ACCOUNT_JSON }}
          SKYTOTO_SPORTS_API_URL: ${{ secrets.SKYTOTO_SPORTS_API_URL }}
          SKYTOTO_SPORTS_API_KEY: ${{ secrets.SKYTOTO_SPORTS_API_KEY }}
        run: python scripts/cloud_runner.py
